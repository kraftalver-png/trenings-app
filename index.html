<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Treningsapp</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background-color: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .day-btn {
      background-color: #1e293b;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 80%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
  let screen = "home";

  let workouts = {
    Monday: [],
    Tuesday: [],
    Wednesday: [],
    Thursday: [],
    Friday: [],
    Saturday: [],
    Sunday: []
  };

  let selectedDay = "Monday";

  function render() {
    const app = document.getElementById("app");

    if (screen === "home") {
      app.innerHTML = `
        <h1>My Training App</h1>
        <button onclick="go('profile')">Profile</button>
        <button onclick="go('training')">Training</button>
        <button onclick="go('edit')">Edit</button>
      `;
    }

    if (screen === "profile") {
      app.innerHTML = `
        <h1>Profile</h1>
        <p>Stats kommer her senere</p>
        <button onclick="go('home')">Back</button>
      `;
    }

    if (screen === "training") {
      let days = Object.keys(workouts).map(day =>
        `<button class="day-btn" onclick="selectDay('${day}')">${day}</button>`
      ).join("");

      let list = workouts[selectedDay].map(w =>
        `<p>- ${w}</p>`
      ).join("");

      app.innerHTML = `
        <h1>Training</h1>
        ${days}
        <h2>${selectedDay}</h2>
        ${list}
        <button onclick="go('home')">Back</button>
      `;
    }

    if (screen === "edit") {
      let days = Object.keys(workouts).map(day =>
        `<button class="day-btn" onclick="selectDay('${day}')">${day}</button>`
      ).join("");

      app.innerHTML = `
        <h1>Edit</h1>
        ${days}
        <h2>Editing: ${selectedDay}</h2>
        <input id="workoutInput" placeholder="Add workout..." />
        <button onclick="addWorkout()">Add</button>
        <button onclick="go('home')">Back</button>
      `;
    }
  }

  function go(s) {
    screen = s;
    render();
  }

  function selectDay(day) {
    selectedDay = day;
    render();
  }

  function addWorkout() {
    const input = document.getElementById("workoutInput");
    if (!input.value) return;

    workouts[selectedDay].push(input.value);
    input.value = "";
    render();
  }

  render();
</script>

</body>
</html>
