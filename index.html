<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training App Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.small-btn {
  background: #ef4444;
  margin-top: 5px;
  padding: 8px;
  font-size: 12px;
}

.day-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.day-btn {
  background: #334155;
}

.back {
  background: #475569;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.stat {
  font-size: 18px;
  margin: 5px 0;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
let screen = "home";
let selectedDay = null;

let workouts = JSON.parse(localStorage.getItem("workouts")) || {
  Monday: [], Tuesday: [], Wednesday: [], Thursday: [], Friday: [], Saturday: [], Sunday: []
};

function save() {
  localStorage.setItem("workouts", JSON.stringify(workouts));
}

function go(s) {
  screen = s;
  render();
}

function selectDay(day) {
  selectedDay = day;
  screen = "day";
  render();
}

function render() {
  const app = document.getElementById("app");

  if (screen === "home") {
    app.innerHTML = `
      <h1>⚽ Training App</h1>
      <div class="card">
        <button onclick="go('profile')">📊 Profile</button>
        <button onclick="go('training')">🏋️ Training</button>
        <button onclick="go('edit')">✏️ Edit</button>
      </div>
    `;
  }

  if (screen === "profile") {
    let total = Object.values(workouts).flat().length;

    app.innerHTML = `
      <h1>📊 Profile</h1>
      <div class="card">
        <p class="stat">🔥 Totale økter: ${total}</p>
        <p class="stat">📅 Dager brukt: ${Object.keys(workouts).filter(d => workouts[d].length > 0).length}</p>
      </div>
      <button class="back" onclick="go('home')">⬅️ Back</button>
    `;
  }

  if (screen === "training") {
    let days = Object.keys(workouts).map(day => `
      <button class="day-btn" onclick="selectDay('${day}')">📅 ${day}</button>
    `).join("");

    app.innerHTML = `
      <h1>🏋️ Training</h1>
      <div class="card day-grid">${days}</div>
      <button class="back" onclick="go('home')">⬅️ Back</button>
    `;
  }

  if (screen === "day") {
    let list = workouts[selectedDay].map((w, i) => `
      <div class="card">
        🔥 ${w}
        <button class="small-btn" onclick="deleteWorkout(${i})">❌ Slett</button>
      </div>
    `).join("");

    if (!list) list = "<p>Ingen økter enda...</p>";

    app.innerHTML = `
      <h1>📅 ${selectedDay}</h1>
      ${list}
      <button onclick="go('training')">⬅️ Back</button>
    `;
  }

  if (screen === "edit") {
    let days = Object.keys(workouts).map(day => `
      <button class="day-btn" onclick="editDay('${day}')">✏️ ${day}</button>
    `).join("");

    app.innerHTML = `
      <h1>✏️ Edit</h1>
      <div class="card day-grid">${days}</div>
      <button class="back" onclick="go('home')">⬅️ Back</button>
    `;
  }

  if (screen === "editDay") {
    let list = workouts[selectedDay].map((w, i) => `
      <div class="card">
        🔥 ${w}
        <button class="small-btn" onclick="deleteWorkout(${i})">❌ Slett</button>
      </div>
    `).join("");

    app.innerHTML = `
      <h1>✏️ ${selectedDay}</h1>
      ${list}
      <input id="input" placeholder="Ny økt..." />
      <button onclick="addWorkout()">➕ Legg til</button>
      <button class="back" onclick="go('edit')">⬅️ Back</button>
    `;
  }
}

function editDay(day) {
  selectedDay = day;
  screen = "editDay";
  render();
}

function addWorkout() {
  const input = document.getElementById("input");
  if (!input.value) return;
  workouts[selectedDay].push(input.value);
  input.value = "";
  save();
  render();
}

function deleteWorkout(index) {
  workouts[selectedDay].splice(index, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
