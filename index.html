<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treningsapp</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.day-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.day-btn {
  background: #334155;
}

.back {
  background: #475569;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>
let screen = "home";
let selectedDay = null;

let workouts = {
  Monday: [],
  Tuesday: [],
  Wednesday: [],
  Thursday: [],
  Friday: [],
  Saturday: [],
  Sunday: []
};

// NAVIGASJON
function go(s) {
  screen = s;
  render();
}

function selectDay(day) {
  selectedDay = day;
  screen = "day";
  render();
}

// RENDER
function render() {
  const app = document.getElementById("app");

  // HOME
  if (screen === "home") {
    app.innerHTML = `
      <h1>⚽ Training App</h1>

      <div class="card">
        <button onclick="go('profile')">📊 Profile</button>
        <button onclick="go('training')">🏋️ Training</button>
        <button onclick="go('edit')">✏️ Edit</button>
      </div>
    `;
  }

  // PROFILE
  if (screen === "profile") {
    app.innerHTML = `
      <h1>📊 Profile</h1>

      <div class="card">
        <p>Stats kommer snart...</p>
      </div>

      <button class="back" onclick="go('home')">⬅️ Back</button>
    `;
  }

  // TRAINING (VELG DAG)
  if (screen === "training") {
    let days = Object.keys(workouts).map(day => `
      <button class="day-btn" onclick="selectDay('${day}')">
        📅 ${day}
      </button>
    `).join("");

    app.innerHTML = `
      <h1>🏋️ Training</h1>

      <div class="card day-grid">
        ${days}
      </div>

      <button class="back" onclick="go('home')">⬅️ Back</button>
    `;
  }

  // VIS DAG
  if (screen === "day") {
    let list = workouts[selectedDay].map(w => `
      <div class="card">🔥 ${w}</div>
    `).join("");

    if (list === "") {
      list = `<p>Ingen økter enda...</p>`;
    }

    app.innerHTML = `
      <h1>📅 ${selectedDay}</h1>

      ${list}

      <button class="back" onclick="go('training')">⬅️ Back</button>
    `;
  }

  // EDIT
  if (screen === "edit") {
    let days = Object.keys(workouts).map(day => `
      <button class="day-btn" onclick="editDay('${day}')">
        ✏️ ${day}
      </button>
    `).join("");

    app.innerHTML = `
      <h1>✏️ Edit</h1>

      <div class="card day-grid">
        ${days}
      </div>

      <button class="back" onclick="go('home')">⬅️ Back</button>
    `;
  }

  // EDIT DAG
  if (screen === "editDay") {
    let list = workouts[selectedDay].map(w => `
      <div class="card">🔥 ${w}</div>
    `).join("");

    app.innerHTML = `
      <h1>✏️ ${selectedDay}</h1>

      ${list}

      <input id="input" placeholder="Ny økt..." />
      <button onclick="addWorkout()">➕ Legg til</button>

      <button class="back" onclick="go('edit')">⬅️ Back</button>
    `;
  }
}

// EDIT DAG NAV
function editDay(day) {
  selectedDay = day;
  screen = "editDay";
  render();
}

// LEGG TIL ØKT
function addWorkout() {
  const input = document.getElementById("input");
  if (!input.value) return;

  workouts[selectedDay].push(input.value);
  input.value = "";
  render();
}

// START
render();
</script>

</body>
</html>
